name = "soundmob"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ad4edb91d0cf4e5ba8d5ee439a8cf374"
preview_id = "e7d2a29566df4b19b68d32174d0b0237"

[durable_objects]
bindings = [{ name = "ROOM", class_name = "Room" }]

[[migrations]]
tag = "v1"
new_classes = ["Room"]

[[secrets_store_secrets]]
binding = "YOUTUBE_DATA_API_KEY"
store_id = "cf7f63f9d571485992997ffb96ec5075"
secret_name = "YOUTUBE_DATA_API_KEY"

[[secrets_store_secrets]]
binding = "SESSION_SECRET"
store_id = "cf7f63f9d571485992997ffb96ec5075"
secret_name = "SESSION_SECRET"

